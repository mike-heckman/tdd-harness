repos:
- repo: local
  hooks:
    - id: project-lint
      name: 🧹 Linting
      entry: bash scripts/lint.sh
      language: system
      always_run: true
      pass_filenames: false

    - id: project-test
      name: 🧪 Unit Tests & Coverage
      entry: bash scripts/test.sh --pre-commit
      language: system
      always_run: true
      pass_filenames: false
